<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <!-- Long forked tongue -->
    <rect x="1" y="10" width="3" height="1" fill="#ef4444"/>
    <rect x="0" y="9" width="1" height="1" fill="#ef4444"/>
    <rect x="0" y="11" width="1" height="1" fill="#ef4444"/>
    <!-- Head — taller so eye fits inside -->
    <rect x="3" y="7" width="6" height="5" rx="1" fill="#60a5fa"/>
    <!-- Nostril -->
    <rect x="4" y="10" width="1" height="1" fill="#1e3a8a"/>
    <!-- Eye — now clearly inside head -->
    <rect x="6" y="8" width="2" height="2" fill="#fbbf24"/>
    <rect x="6" y="8" width="1" height="1" fill="#000"/>
    <!-- Ear hole -->
    <rect x="8" y="6" width="1" height="1" fill="#1e40af"/>
    <!-- Thick scaly neck -->
    <rect x="7" y="11" width="4" height="3" fill="#3b82f6"/>
    <!-- Heavy low body -->
    <rect x="9" y="11" width="10" height="6" rx="2" fill="#3b82f6"/>
    <!-- Belly scales -->
    <rect x="10" y="14" width="8" height="2" fill="#60a5fa"/>
    <!-- Back scales / ridges -->
    <rect x="10" y="10" width="2" height="2" fill="#2563eb"/>
    <rect x="13" y="10" width="2" height="2" fill="#2563eb"/>
    <rect x="16" y="10" width="2" height="2" fill="#2563eb"/>
    <!-- Long muscular tail -->
    <rect x="17" y="12" width="5" height="3" rx="1" fill="#3b82f6"/>
    <rect x="20" y="11" width="3" height="2" fill="#2563eb"/>
    <!-- Powerful legs -->
    <rect x="10" y="17" width="3" height="3" fill="#1e40af"/>
    <rect x="16" y="17" width="3" height="3" fill="#1e40af"/>
    <!-- Feet with claws -->
    <rect x="9" y="20" width="4" height="1" fill="#1e3a8a"/>
    <rect x="15" y="20" width="4" height="1" fill="#1e3a8a"/>
  </svg>