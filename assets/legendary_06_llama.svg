<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <!-- === STANDING PHOENIX WITH LEGS, WINGS SPREAD === -->
    <!-- Left wing (spread wide) -->
    <rect x="2" y="8" width="7" height="6" fill="#f59e0b"/>
    <rect x="3" y="7" width="5" height="2" fill="#fbbf24"/>
    <rect x="4" y="6" width="3" height="2" fill="#fef3c7"/>
    <rect x="3" y="9" width="5" height="5" fill="#fbbf24"/>
    <rect x="5" y="10" width="3" height="4" fill="#fef3c7"/>
    <rect x="2" y="14" width="4" height="2" fill="#b45309"/>
    <rect x="2" y="11" width="1" height="3" fill="#ef4444"/>
    <rect x="4" y="5" width="1" height="2" fill="#ef4444"/>
    <!-- Right wing (spread wide) -->
    <rect x="15" y="8" width="7" height="6" fill="#f59e0b"/>
    <rect x="16" y="7" width="5" height="2" fill="#fbbf24"/>
    <rect x="17" y="6" width="3" height="2" fill="#fef3c7"/>
    <rect x="16" y="9" width="5" height="5" fill="#fbbf24"/>
    <rect x="16" y="10" width="3" height="4" fill="#fef3c7"/>
    <rect x="18" y="14" width="4" height="2" fill="#b45309"/>
    <rect x="21" y="11" width="1" height="3" fill="#ef4444"/>
    <rect x="19" y="5" width="1" height="2" fill="#ef4444"/>
    <!-- Body -->
    <rect x="9" y="7" width="6" height="7" fill="#f59e0b"/>
    <rect x="10" y="8" width="4" height="5" fill="#fbbf24"/>
    <rect x="11" y="9" width="2" height="3" fill="#fef3c7"/>
    <!-- Head -->
    <rect x="10" y="3" width="4" height="5" fill="#f59e0b"/>
    <rect x="11" y="4" width="2" height="3" fill="#fbbf24"/>
    <!-- Eye -->
    <rect x="11" y="5" width="1" height="1" fill="#0a0a0f"/>
    <!-- Beak -->
    <rect x="14" y="5" width="2" height="1" fill="#b45309"/>
    <rect x="14" y="4" width="1" height="1" fill="#fbbf24"/>
    <!-- Crest -->
    <rect x="10" y="2" width="2" height="2" fill="#fef3c7"/>
    <rect x="12" y="2" width="2" height="1" fill="#fbbf24"/>
    <rect x="11" y="1" width="2" height="1" fill="#fef3c7"/>
    <rect x="12" y="0" width="2" height="1" fill="#ef4444"/>
    <!-- Legs (longer, standing tall) -->
    <rect x="9" y="14" width="2" height="7" fill="#b45309"/>
    <rect x="13" y="14" width="2" height="7" fill="#b45309"/>
    <rect x="9" y="16" width="2" height="5" fill="#f59e0b"/>
    <rect x="13" y="16" width="2" height="5" fill="#f59e0b"/>
    <!-- Feet/claws (lowered) -->
    <rect x="8" y="21" width="3" height="1" fill="#fbbf24"/>
    <rect x="12" y="21" width="3" height="1" fill="#fbbf24"/>
    <rect x="8" y="22" width="1" height="1" fill="#b45309"/>
    <rect x="10" y="22" width="1" height="1" fill="#b45309"/>
    <rect x="12" y="22" width="1" height="1" fill="#b45309"/>
    <rect x="14" y="22" width="1" height="1" fill="#b45309"/>
    <!-- Tail -->
    <rect x="10" y="15" width="4" height="3" fill="#f59e0b"/>
    <rect x="9" y="16" width="2" height="2" fill="#fbbf24"/>
    <rect x="13" y="16" width="2" height="2" fill="#fbbf24"/>
    <rect x="11" y="18" width="2" height="2" fill="#fbbf24"/>
    <rect x="11" y="20" width="2" height="1" fill="#fef3c7"/>
    <rect x="10" y="19" width="1" height="2" fill="#ef4444"/>
    <rect x="13" y="19" width="1" height="2" fill="#ef4444"/>
  </svg>