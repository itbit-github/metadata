<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <!-- === SWIMMING LEFT (side profile, facing left) === -->
    <!-- === THICK RED HAIR (flowing behind, not on face) === -->
    <!-- Top/back of head hair -->
    <rect x="8" y="1" width="5" height="3" fill="#dc2626"/>
    <rect x="9" y="2" width="5" height="3" fill="#b91c1c"/>
    <rect x="10" y="3" width="4" height="3" fill="#991b1b"/>
    <rect x="11" y="1" width="3" height="2" fill="#ef4444"/>
    <!-- Top/forehead hair reaching forward -->
    <rect x="6" y="1" width="6" height="3" fill="#dc2626"/>
    <rect x="5" y="2" width="7" height="3" fill="#b91c1c"/>
    <rect x="6" y="3" width="5" height="2" fill="#991b1b"/>
    <rect x="7" y="1" width="4" height="2" fill="#ef4444"/>
    <!-- Hair behind neck (thick, connected) -->
    <rect x="10" y="5" width="5" height="4" fill="#dc2626"/>
    <rect x="11" y="6" width="5" height="4" fill="#b91c1c"/>
    <rect x="12" y="7" width="5" height="5" fill="#991b1b"/>
    <rect x="13" y="8" width="5" height="5" fill="#7f1d1d"/>
    <rect x="14" y="10" width="4" height="4" fill="#7f1d1d"/>
    <rect x="15" y="11" width="3" height="3" fill="#991b1b"/>
    <!-- Hair highlights -->
    <rect x="11" y="5" width="3" height="2" fill="#ef4444"/>
    <rect x="12" y="7" width="2" height="2" fill="#dc2626"/>
    <!-- Head (side, facing left) -->
    <rect x="5" y="4" width="7" height="6" rx="1" fill="#fde68a"/>
    <rect x="6" y="5" width="5" height="4" fill="#fef3c7"/>
    <!-- Eye (all blue with black pupil) -->
    <rect x="6" y="6" width="2" height="2" fill="#60a5fa"/>
    <rect x="7" y="7" width="1" height="1" fill="#000"/>
    <!-- Eyelash -->
    <rect x="6" y="5" width="2" height="1" fill="#991b1b"/>
    <!-- Snout extending forward (front of face) -->
    <rect x="4" y="7" width="2" height="2" rx="1" fill="#fde68a"/>
    <!-- Mouth -->
    <rect x="6" y="9" width="2" height="1" fill="#f472b6"/>
    <!-- Neck -->
    <rect x="8" y="10" width="3" height="2" fill="#fde68a"/>
    <!-- Torso -->
    <rect x="8" y="12" width="5" height="4" fill="#fde68a"/>
    <rect x="9" y="13" width="3" height="2" fill="#fef3c7"/>
    <!-- Shell bikini top -->
    <rect x="8" y="12" width="5" height="2" fill="#f472b6"/>
    <rect x="9" y="12" width="2" height="1" fill="#f9a8d4"/>
    <!-- Arm (one arm reaching front down) -->
    <rect x="6" y="12" width="2" height="7" fill="#fde68a"/>
    <!-- Hand -->
    <rect x="6" y="19" width="2" height="1" fill="#fde68a"/>
    <!-- Tail base (thick) -->
    <rect x="9" y="16" width="4" height="3" fill="#22c55e"/>
    <rect x="10" y="16" width="3" height="3" fill="#16a34a"/>
    <!-- Tail body (tapers to the right) -->
    <rect x="11" y="18" width="5" height="3" fill="#22c55e"/>
    <rect x="12" y="18" width="4" height="3" fill="#16a34a"/>
    <rect x="13" y="19" width="4" height="2" fill="#22c55e"/>
    <rect x="14" y="20" width="4" height="2" fill="#16a34a"/>
    <rect x="15" y="21" width="3" height="2" fill="#22c55e"/>
    <!-- Tail narrows -->
    <rect x="16" y="20" width="3" height="2" fill="#22c55e"/>
    <rect x="17" y="19" width="2" height="3" fill="#16a34a"/>
    <rect x="18" y="18" width="2" height="3" fill="#22c55e"/>
    <!-- FISH TAIL FIN (classic horizontal fluke) -->
    <rect x="19" y="16" width="2" height="2" fill="#86efac"/>
    <rect x="20" y="14" width="3" height="3" fill="#4ade80"/>
    <rect x="21" y="13" width="2" height="2" fill="#86efac"/>
    <rect x="20" y="18" width="3" height="3" fill="#4ade80"/>
    <rect x="21" y="20" width="2" height="2" fill="#86efac"/>
    <rect x="22" y="14" width="1" height="2" fill="#fff" opacity="0.5"/>
    <rect x="22" y="19" width="1" height="2" fill="#fff" opacity="0.5"/>
    <!-- Scales -->
    <rect x="10" y="17" width="1" height="1" fill="#86efac"/>
    <rect x="12" y="19" width="1" height="1" fill="#86efac"/>
    <rect x="14" y="20" width="1" height="1" fill="#86efac"/>
    <rect x="16" y="21" width="1" height="1" fill="#86efac"/>
  </svg>