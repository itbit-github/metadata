<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <!-- Neck -->
    <rect x="16" y="2" width="4" height="10" fill="#60a5fa"/>
    <rect x="15" y="3" width="2" height="8" fill="#3b82f6"/>
    <!-- Head -->
    <rect x="15" y="1" width="6" height="3" rx="1" fill="#60a5fa"/>
