<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <!-- === FRONT FACE BOAR 🐗 BIGGER === -->
    <!-- Head base -->
    <rect x="3" y="2" width="18" height="16" rx="1" fill="#5c3a21"/>
    <rect x="4" y="3" width="16" height="14" fill="#6d4c33"/>
    <rect x="5" y="4" width="14" height="12" fill="#7d5a44"/>
    <!-- Forehead -->
    <rect x="4" y="2" width="16" height="6" fill="#6d4c33"/>
    <rect x="6" y="2" width="12" height="5" fill="#7d5a44"/>
    <!-- Ears (pointy, bigger) -->
    <rect x="1" y="1" width="5" height="5" rx="1" fill="#5c3a21"/>
    <rect x="2" y="2" width="3" height="3" fill="#6d4c33"/>
    <rect x="18" y="1" width="5" height="5" rx="1" fill="#5c3a21"/>
    <rect x="19" y="2" width="3" height="3" fill="#6d4c33"/>
    <!-- Inner ears -->
    <rect x="2" y="2" width="2" height="2" fill="#3e2723"/>
    <rect x="20" y="2" width="2" height="2" fill="#3e2723"/>
    <!-- Eyes (angry, bigger) -->
    <rect x="5" y="6" width="4" height="3" fill="#000"/>
    <rect x="6" y="7" width="2" height="1" fill="#ef4444"/>
    <rect x="15" y="6" width="4" height="3" fill="#000"/>
    <rect x="16" y="7" width="2" height="1" fill="#ef4444"/>
    <!-- Brow ridge -->
    <rect x="4" y="5" width="6" height="1" fill="#3e2723"/>
    <rect x="14" y="5" width="6" height="1" fill="#3e2723"/>
    <!-- Snout (big, wider) -->
    <rect x="7" y="8" width="10" height="7" rx="1" fill="#8d6e63"/>
    <rect x="8" y="9" width="8" height="5" fill="#a1887f"/>
    <!-- Nose tip -->
    <rect x="9" y="12" width="6" height="3" fill="#3e2723"/>
    <rect x="10" y="13" width="4" height="2" fill="#1a1a1a"/>
    <!-- Nostrils -->
    <rect x="10" y="13" width="1" height="1" fill="#000"/>
    <rect x="13" y="13" width="1" height="1" fill="#000"/>
    <!-- Tusks (white, curling up, bigger) -->
    <rect x="5" y="11" width="3" height="4" fill="#fff"/>
    <rect x="4" y="12" width="3" height="4" fill="#f5f5f5"/>
    <rect x="4" y="15" width="2" height="2" fill="#e5e5e5"/>
    <rect x="16" y="11" width="3" height="4" fill="#fff"/>
    <rect x="17" y="12" width="3" height="4" fill="#f5f5f5"/>
    <rect x="18" y="15" width="2" height="2" fill="#e5e5e5"/>
    <!-- Mouth (under snout) -->
    <rect x="9" y="15" width="6" height="1" fill="#3e2723"/>
    <!-- Cheek fur (bigger) -->
    <rect x="3" y="8" width="4" height="5" fill="#5c3a21"/>
    <rect x="17" y="8" width="4" height="5" fill="#5c3a21"/>
    <!-- Lower jaw -->
    <rect x="7" y="17" width="10" height="3" fill="#6d4c33"/>
    <rect x="8" y="18" width="8" height="2" fill="#7d5a44"/>
    <!-- Gold legendary accents -->
    <rect x="2" y="1" width="1" height="1" fill="#fbbf24"/>
    <rect x="21" y="1" width="1" height="1" fill="#fbbf24"/>
    <rect x="6" y="4" width="1" height="1" fill="#fbbf24"/>
    <rect x="17" y="4" width="1" height="1" fill="#fbbf24"/>
    <rect x="9" y="10" width="1" height="1" fill="#fbbf24"/>
    <rect x="14" y="10" width="1" height="1" fill="#fbbf24"/>
  </svg>