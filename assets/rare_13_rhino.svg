<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <!-- Ears -->
    <rect x="5" y="2" width="3" height="4" fill="#3b82f6"/>
    <rect x="16" y="2" width="3" height="4" fill="#3b82f6"/>
    <!-- Massive horn -->
    <rect x="10" y="0" width="4" height="6" fill="#e5e7eb"/>
    <rect x="11" y="0" width="2" height="2" fill="#fff"/>
    <rect x="10" y="2" width="1" height="3" fill="#9ca3af"/>
    <rect x="13" y="2" width="1" height="3" fill="#9ca3af"/>
    <!-- Head -->
    <rect x="4" y="5" width="16" height="10" rx="1" fill="#60a5fa"/>
    <!-- Armor plates -->
    <rect x="6" y="6" width="3" height="2" fill="#3b82f6"/>
    <rect x="15" y="6" width="3" height="2" fill="#3b82f6"/>
    <rect x="9" y="5" width="6" height="2" fill="#2563eb"/>
    <!-- Eyes -->
    <rect x="7" y="8" width="2" height="2" fill="#fbbf24"/>
    <rect x="15" y="8" width="2" height="2" fill="#fbbf24"/>
    <rect x="7" y="8" width="1" height="1" fill="#000"/>
    <rect x="15" y="8" width="1" height="1" fill="#000"/>
    <!-- Nostrils -->
    <rect x="9" y="13" width="2" height="2" fill="#1e3a8a"/>
    <rect x="13" y="13" width="2" height="2" fill="#1e3a8a"/>
    <!-- Mouth -->
    <rect x="10" y="15" width="4" height="1" fill="#0a0a0f"/>
    <!-- Body -->
    <rect x="5" y="14" width="14" height="7" rx="1" fill="#60a5fa"/>
    <!-- Back hump -->
    <rect x="6" y="13" width="4" height="2" fill="#3b82f6"/>
    <rect x="14" y="13" width="4" height="2" fill="#3b82f6"/>
    <!-- Legs -->
    <rect x="6" y="19" width="3" height="4" fill="#3b82f6"/>
    <rect x="15" y="19" width="3" height="4" fill="#3b82f6"/>
    <rect x="10" y="20" width="2" height="3" fill="#3b82f6"/>
    <rect x="13" y="20" width="2" height="3" fill="#3b82f6"/>
  </svg>