<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <!-- Curved beak -->
    <rect x="2" y="7" width="4" height="2" fill="#93c5fd"/>
    <rect x="1" y="8" width="2" height="2" fill="#60a5fa"/>
    <!-- Head -->
    <rect x="6" y="5" width="5" height="5" rx="1" fill="#60a5fa"/>
    <!-- Eye -->
    <rect x="7" y="6" width="2" height="2" fill="#fbbf24"/>
    <rect x="7" y="6" width="1" height="1" fill="#000"/>
    <!-- Long S-curve neck -->
    <rect x="10" y="7" width="2" height="4" fill="#3b82f6"/>
    <rect x="11" y="9" width="2" height="3" fill="#3b82f6"/>
    <rect x="12" y="11" width="2" height="3" fill="#3b82f6"/>
    <!-- Body -->
    <rect x="12" y="13" width="7" height="5" rx="2" fill="#60a5fa"/>
    <!-- Wing -->
    <rect x="14" y="14" width="4" height="3" fill="#3b82f6"/>
    <!-- One long leg -->
    <rect x="14" y="18" width="2" height="5" fill="#1e40af"/>
    <!-- Foot in water -->
    <rect x="13" y="23" width="4" height="1" fill="#1e3a8a"/>
    <!-- Tucked leg (knee up) -->
    <rect x="17" y="17" width="2" height="2" fill="#1e40af"/>
    <rect x="18" y="15" width="1" height="2" fill="#1e40af"/>
  </svg>