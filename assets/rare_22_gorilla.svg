<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <!-- Brow ridge -->
    <rect x="4" y="2" width="16" height="4" rx="1" fill="#3b82f6"/>
    <rect x="3" y="4" width="2" height="3" fill="#2563eb"/>
    <rect x="19" y="4" width="2" height="3" fill="#2563eb"/>
    <!-- Head -->
    <rect x="5" y="5" width="14" height="10" rx="1" fill="#60a5fa"/>
    <!-- Silverback streak -->
    <rect x="10" y="5" width="4" height="5" fill="#93c5fd"/>
    <!-- Eyes -->
    <rect x="7" y="7" width="3" height="2" fill="#fbbf24"/>
    <rect x="14" y="7" width="3" height="2" fill="#fbbf24"/>
    <rect x="8" y="7" width="1" height="1" fill="#000"/>
    <rect x="15" y="7" width="1" height="1" fill="#000"/>
    <!-- Nose -->
    <rect x="10" y="10" width="4" height="3" rx="1" fill="#1e3a8a"/>
    <rect x="11" y="11" width="1" height="1" fill="#0a0a0f"/>
    <rect x="12" y="11" width="1" height="1" fill="#0a0a0f"/>
    <!-- Mouth -->
    <rect x="10" y="13" width="4" height="1" fill="#0a0a0f"/>
    <!-- Fangs -->
    <rect x="9" y="14" width="1" height="1" fill="#fff"/>
    <rect x="14" y="14" width="1" height="1" fill="#fff"/>
    <!-- Muscular jaw -->
    <rect x="6" y="12" width="3" height="4" fill="#3b82f6"/>
    <rect x="15" y="12" width="3" height="4" fill="#3b82f6"/>
    <!-- Big body -->
    <rect x="4" y="14" width="16" height="8" rx="1" fill="#60a5fa"/>
    <!-- Silverback chest -->
    <rect x="8" y="15" width="8" height="5" rx="1" fill="#93c5fd"/>
    <!-- Muscular arms -->
    <rect x="2" y="15" width="4" height="6" rx="1" fill="#3b82f6"/>
    <rect x="18" y="15" width="4" height="6" rx="1" fill="#3b82f6"/>
    <!-- Fists -->
    <rect x="1" y="19" width="3" height="3" rx="1" fill="#1e40af"/>
    <rect x="20" y="19" width="3" height="3" rx="1" fill="#1e40af"/>
    <!-- Legs -->
    <rect x="6" y="20" width="4" height="3" fill="#3b82f6"/>
    <rect x="14" y="20" width="4" height="3" fill="#3b82f6"/>
    <!-- Feet -->
    <rect x="5" y="22" width="5" height="1" fill="#1e40af"/>
    <rect x="14" y="22" width="5" height="1" fill="#1e40af"/>
  </svg>