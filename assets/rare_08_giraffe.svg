<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <!-- Ossicones (horns) -->
    <rect x="10" y="1" width="1" height="2" fill="#3b82f6"/>
    <rect x="13" y="1" width="1" height="2" fill="#3b82f6"/>
    <rect x="10" y="1" width="1" height="1" fill="#fbbf24"/>
    <rect x="13" y="1" width="1" height="1" fill="#fbbf24"/>
    <!-- Head -->
    <rect x="9" y="3" width="6" height="4" rx="1" fill="#60a5fa"/>
    <!-- Snout -->
    <rect x="10" y="6" width="4" height="2" rx="1" fill="#93c5fd"/>
    <!-- Eyes -->
    <rect x="9" y="4" width="2" height="2" fill="#fbbf24"/>
    <rect x="13" y="4" width="2" height="2" fill="#fbbf24"/>
    <rect x="9" y="4" width="1" height="1" fill="#000"/>
    <rect x="13" y="4" width="1" height="1" fill="#000"/>
    <!-- Nostrils -->
    <rect x="11" y="6" width="1" height="1" fill="#1e3a8a"/>
    <rect x="12" y="6" width="1" height="1" fill="#1e3a8a"/>
    <!-- Long neck -->
    <rect x="10" y="7" width="4" height="8" fill="#60a5fa"/>
    <!-- Neck spots -->
    <rect x="10" y="8" width="1" height="2" fill="#2563eb"/>
    <rect x="13" y="10" width="1" height="2" fill="#2563eb"/>
    <rect x="11" y="12" width="1" height="2" fill="#2563eb"/>
    <!-- Body -->
    <rect x="7" y="14" width="10" height="6" rx="1" fill="#60a5fa"/>
    <!-- Body spots -->
    <rect x="8" y="15" width="2" height="2" fill="#2563eb"/>
    <rect x="13" y="16" width="2" height="2" fill="#2563eb"/>
    <!-- Legs -->
    <rect x="8" y="19" width="2" height="4" fill="#3b82f6"/>
    <rect x="14" y="19" width="2" height="4" fill="#3b82f6"/>
    <!-- Tail -->
    <rect x="17" y="15" width="2" height="4" fill="#3b82f6"/>
    <rect x="17" y="18" width="2" height="2" fill="#2563eb"/>
  </svg>