<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <!-- === DEMONIC HEAD WITH RED FACE === -->
    <!-- Shaped curved horns (moved to center, tapered) -->
    <!-- Left horn -->
    <rect x="5" y="0" width="2" height="2" fill="#fbbf24"/>
    <rect x="4" y="1" width="3" height="2" fill="#fef3c7"/>
    <rect x="4" y="2" width="4" height="2" fill="#f59e0b"/>
    <rect x="3" y="3" width="5" height="2" fill="#b45309"/>
    <rect x="3" y="4" width="5" height="2" fill="#991b1b"/>
    <rect x="4" y="5" width="4" height="1" fill="#7f1d1d"/>
    <!-- Right horn -->
    <rect x="17" y="0" width="2" height="2" fill="#fbbf24"/>
    <rect x="17" y="1" width="3" height="2" fill="#fef3c7"/>
    <rect x="16" y="2" width="4" height="2" fill="#f59e0b"/>
    <rect x="16" y="3" width="5" height="2" fill="#b45309"/>
    <rect x="16" y="4" width="5" height="2" fill="#991b1b"/>
    <rect x="16" y="5" width="4" height="1" fill="#7f1d1d"/>
    <!-- Head (red face) -->
    <rect x="4" y="5" width="16" height="15" rx="1" fill="#dc2626"/>
    <rect x="5" y="6" width="14" height="13" fill="#ef4444"/>
    <!-- Dark brow ridge -->
    <rect x="4" y="6" width="16" height="3" fill="#991b1b"/>
    <rect x="5" y="7" width="14" height="2" fill="#b91c1c"/>
    <!-- Angry eyes (glowing yellow) -->
    <rect x="5" y="10" width="5" height="4" fill="#1a1a1a"/>
    <rect x="14" y="10" width="5" height="4" fill="#1a1a1a"/>
    <rect x="6" y="11" width="3" height="2" fill="#fbbf24"/>
    <rect x="15" y="11" width="3" height="2" fill="#fbbf24"/>
    <rect x="7" y="12" width="1" height="1" fill="#fff"/>
    <rect x="16" y="12" width="1" height="1" fill="#fff"/>
    <!-- Slanted angry eyebrows -->
    <rect x="4" y="9" width="6" height="1" fill="#7f1d1d"/>
    <rect x="14" y="9" width="6" height="1" fill="#7f1d1d"/>
    <rect x="3" y="8" width="4" height="1" fill="#7f1d1d"/>
    <rect x="17" y="8" width="4" height="1" fill="#7f1d1d"/>
    <!-- Nose (flat, wide) -->
    <rect x="10" y="14" width="4" height="2" fill="#991b1b"/>
    <rect x="11" y="14" width="2" height="1" fill="#b91c1c"/>
    <!-- Mouth (wide grin with fangs) -->
    <rect x="7" y="17" width="10" height="3" fill="#1a1a1a"/>
    <rect x="8" y="17" width="8" height="1" fill="#7f1d1d"/>
    <!-- Fangs -->
    <rect x="8" y="16" width="2" height="2" fill="#fff"/>
    <rect x="14" y="16" width="2" height="2" fill="#fff"/>
    <rect x="9" y="16" width="1" height="1" fill="#e5e7eb"/>
    <rect x="15" y="16" width="1" height="1" fill="#e5e7eb"/>
    <!-- Chin spike -->
    <rect x="11" y="20" width="2" height="2" fill="#991b1b"/>
    <rect x="11" y="21" width="2" height="1" fill="#b91c1c"/>
    <!-- Pointy ears -->
    <rect x="2" y="7" width="2" height="4" fill="#dc2626"/>
    <rect x="20" y="7" width="2" height="4" fill="#dc2626"/>
    <rect x="1" y="8" width="1" height="2" fill="#991b1b"/>
    <rect x="22" y="8" width="1" height="2" fill="#991b1b"/>
  </svg>