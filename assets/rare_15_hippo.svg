<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <!-- Ears -->
    <rect x="5" y="3" width="3" height="3" fill="#3b82f6"/>
    <rect x="16" y="3" width="3" height="3" fill="#3b82f6"/>
    <!-- Huge head -->
    <rect x="4" y="5" width="16" height="12" rx="1" fill="#60a5fa"/>
    <!-- Snout/mouth -->
    <rect x="6" y="12" width="12" height="5" rx="1" fill="#93c5fd"/>
    <!-- Nostrils -->
    <rect x="8" y="13" width="2" height="2" fill="#1e3a8a"/>
    <rect x="14" y="13" width="2" height="2" fill="#1e3a8a"/>
    <!-- Teeth -->
    <rect x="7" y="16" width="1" height="2" fill="#fff"/>
    <rect x="16" y="16" width="1" height="2" fill="#fff"/>
    <!-- Eyes -->
    <rect x="7" y="8" width="2" height="2" fill="#fbbf24"/>
    <rect x="15" y="8" width="2" height="2" fill="#fbbf24"/>
    <rect x="7" y="8" width="1" height="1" fill="#000"/>
    <rect x="15" y="8" width="1" height="1" fill="#000"/>
    <!-- Body -->
    <rect x="5" y="16" width="14" height="6" rx="1" fill="#60a5fa"/>
    <!-- Stubby legs -->
    <rect x="6" y="19" width="3" height="4" fill="#3b82f6"/>
    <rect x="15" y="19" width="3" height="4" fill="#3b82f6"/>
    <rect x="9" y="20" width="2" height="3" fill="#3b82f6"/>
    <rect x="13" y="20" width="2" height="3" fill="#3b82f6"/>
  </svg>