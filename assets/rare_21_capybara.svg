<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <!-- Ears -->
    <rect x="6" y="3" width="2" height="2" fill="#3b82f6"/>
    <rect x="16" y="3" width="2" height="2" fill="#3b82f6"/>
    <!-- Head -->
    <rect x="7" y="4" width="10" height="6" rx="2" fill="#60a5fa"/>
    <!-- Snout -->
    <rect x="10" y="8" width="4" height="3" rx="1" fill="#93c5fd"/>
    <!-- Eyes -->
    <rect x="8" y="6" width="2" height="2" fill="#fbbf24"/>
    <rect x="14" y="6" width="2" height="2" fill="#fbbf24"/>
    <rect x="8" y="6" width="1" height="1" fill="#000"/>
    <rect x="14" y="6" width="1" height="1" fill="#000"/>
    <!-- Nostrils -->
    <rect x="11" y="9" width="1" height="1" fill="#1e3a8a"/>
    <rect x="12" y="9" width="1" height="1" fill="#1e3a8a"/>
    <!-- Big rounded body -->
    <rect x="4" y="10" width="16" height="10" rx="4" fill="#60a5fa"/>
    <!-- Belly -->
    <rect x="7" y="13" width="10" height="5" rx="2" fill="#93c5fd"/>
    <!-- Front legs -->
    <rect x="6" y="17" width="3" height="5" fill="#3b82f6"/>
    <rect x="15" y="17" width="3" height="5" fill="#3b82f6"/>
    <!-- Toes -->
    <rect x="6" y="21" width="1" height="2" fill="#1e40af"/>
    <rect x="8" y="21" width="1" height="2" fill="#1e40af"/>
    <rect x="15" y="21" width="1" height="2" fill="#1e40af"/>
    <rect x="17" y="21" width="1" height="2" fill="#1e40af"/>
  </svg>