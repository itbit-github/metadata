<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <!-- Wings -->
    <rect x="1" y="6" width="8" height="10" fill="#3b82f6"/>
    <rect x="15" y="6" width="8" height="10" fill="#3b82f6"/>
    <!-- Wing tips -->
    <rect x="2" y="4" width="6" height="3" fill="#60a5fa"/>
    <rect x="16" y="4" width="6" height="3" fill="#60a5fa"/>
    <rect x="3" y="3" width="4" height="2" fill="#60a5fa"/>
    <rect x="17" y="3" width="4" height="2" fill="#60a5fa"/>
    <!-- Body -->
    <rect x="9" y="7" width="6" height="10" fill="#60a5fa"/>
    <!-- Head -->
    <rect x="9" y="4" width="6" height="4" rx="1" fill="#60a5fa"/>
    <!-- Eye -->
    <rect x="11" y="5" width="2" height="2" fill="#fbbf24"/>
    <rect x="11" y="5" width="1" height="1" fill="#000"/>
    <!-- Beak -->
    <rect x="13" y="5" width="3" height="2" fill="#f59e0b"/>
    <rect x="15" y="6" width="2" height="1" fill="#f59e0b"/>
    <!-- Tail -->
    <rect x="10" y="16" width="4" height="5" fill="#3b82f6"/>
    <rect x="9" y="18" width="2" height="3" fill="#3b82f6"/>
    <rect x="13" y="18" width="2" height="3" fill="#3b82f6"/>
    <!-- Talons -->
    <rect x="10" y="21" width="1" height="2" fill="#f59e0b"/>
    <rect x="13" y="21" width="1" height="2" fill="#f59e0b"/>
  </svg>