<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <!-- Curled tail -->
    <rect x="18" y="13" width="4" height="3" fill="#3b82f6"/>
    <rect x="20" y="11" width="3" height="3" fill="#3b82f6"/>
    <rect x="21" y="9" width="2" height="3" fill="#2563eb"/>
    <!-- Body -->
    <rect x="6" y="10" width="14" height="7" rx="1" fill="#60a5fa"/>
    <!-- Belly stripe -->
    <rect x="8" y="12" width="10" height="3" fill="#93c5fd"/>
    <!-- Head -->
    <rect x="4" y="8" width="7" height="6" rx="1" fill="#60a5fa"/>
    <!-- Eye stalks -->
    <rect x="3" y="6" width="2" height="3" fill="#3b82f6"/>
    <rect x="9" y="5" width="2" height="3" fill="#3b82f6"/>
    <!-- Bulging eyes -->
    <rect x="2" y="5" width="3" height="3" fill="#fbbf24"/>
    <rect x="9" y="4" width="3" height="3" fill="#fbbf24"/>
    <rect x="3" y="6" width="1" height="1" fill="#000"/>
    <rect x="10" y="5" width="1" height="1" fill="#000"/>
    <!-- Mouth -->
    <rect x="5" y="12" width="3" height="1" fill="#0a0a0f"/>
    <!-- Legs -->
    <rect x="7" y="16" width="2" height="3" fill="#3b82f6"/>
    <rect x="12" y="16" width="2" height="3" fill="#3b82f6"/>
    <rect x="16" y="16" width="2" height="3" fill="#3b82f6"/>
    <!-- Body spots -->
    <rect x="10" y="11" width="1" height="1" fill="#2563eb"/>
    <rect x="14" y="13" width="1" height="1" fill="#2563eb"/>
    <rect x="9" y="14" width="1" height="1" fill="#2563eb"/>
  </svg>