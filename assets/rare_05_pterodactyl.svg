<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <!-- Crest on head -->
    <rect x="11" y="0" width="2" height="3" fill="#3b82f6"/>
    <rect x="10" y="1" width="1" height="2" fill="#2563eb"/>
    <!-- Long head with beak -->
    <rect x="8" y="3" width="12" height="4" rx="1" fill="#60a5fa"/>
    <!-- Beak tip -->
    <rect x="18" y="4" width="4" height="2" fill="#93c5fd"/>
    <!-- Eye -->
    <rect x="10" y="4" width="2" height="2" fill="#fbbf24"/>
    <rect x="10" y="4" width="1" height="1" fill="#000"/>
    <!-- Neck -->
    <rect x="10" y="7" width="3" height="3" fill="#3b82f6"/>
    <!-- Body -->
    <rect x="8" y="9" width="7" height="5" rx="1" fill="#60a5fa"/>
    <!-- Belly -->
    <rect x="9" y="11" width="5" height="2" fill="#93c5fd"/>
    <!-- Wing membranes — left -->
    <rect x="0" y="10" width="8" height="6" fill="#3b82f6"/>
    <rect x="1" y="9" width="6" height="2" fill="#2563eb"/>
    <rect x="2" y="8" width="4" height="2" fill="#3b82f6"/>
    <!-- Wing membranes — right -->
    <rect x="15" y="10" width="9" height="6" fill="#3b82f6"/>
    <rect x="16" y="9" width="7" height="2" fill="#2563eb"/>
    <rect x="17" y="8" width="5" height="2" fill="#3b82f6"/>
    <!-- Wing bone lines -->
    <rect x="3" y="12" width="1" height="3" fill="#2563eb"/>
    <rect x="19" y="12" width="1" height="3" fill="#2563eb"/>
    <!-- Legs -->
    <rect x="9" y="14" width="2" height="3" fill="#1e40af"/>
    <rect x="12" y="14" width="2" height="3" fill="#1e40af"/>
    <!-- Feet -->
    <rect x="8" y="17" width="3" height="1" fill="#1e3a8a"/>
    <rect x="12" y="17" width="3" height="1" fill="#1e3a8a"/>
  </svg>