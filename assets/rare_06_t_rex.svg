<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <!-- Head -->
    <rect x="12" y="2" width="10" height="8" rx="1" fill="#60a5fa"/>
    <!-- Eye -->
    <rect x="14" y="4" width="3" height="3" fill="#fbbf24"/>
    <rect x="15" y="5" width="1" height="1" fill="#000"/>
    <!-- Teeth -->
    <rect x="18" y="9" width="1" height="2" fill="#fff"/>
    <rect x="20" y="9" width="1" height="2" fill="#fff"/>
    <!-- Body -->
    <rect x="8" y="10" width="12" height="10" rx="1" fill="#60a5fa"/>
    <!-- Belly -->
    <rect x="10" y="12" width="8" height="6" fill="#3b82f6"/>
    <!-- Spots -->
    <rect x="9" y="11" width="1" height="1" fill="#0a0a0f"/>
    <rect x="17" y="14" width="1" height="1" fill="#0a0a0f"/>
    <!-- Tail -->
    <rect x="4" y="12" width="5" height="4" fill="#60a5fa"/>
    <rect x="2" y="14" width="3" height="3" fill="#60a5fa"/>
    <rect x="1" y="16" width="2" height="2" fill="#60a5fa"/>
    <!-- Arms -->
    <rect x="10" y="14" width="2" height="3" fill="#3b82f6"/>
    <rect x="16" y="14" width="2" height="3" fill="#3b82f6"/>
    <!-- Legs -->
    <rect x="8" y="19" width="4" height="4" fill="#3b82f6"/>
    <rect x="15" y="19" width="4" height="4" fill="#3b82f6"/>
  </svg>