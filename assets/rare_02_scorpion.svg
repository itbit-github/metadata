<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <!-- Left claw arm -->
    <rect x="1" y="8" width="4" height="2" fill="#3b82f6"/>
    <rect x="0" y="6" width="3" height="3" rx="1" fill="#60a5fa"/>
    <!-- Left pincer (open claw) -->
    <rect x="0" y="4" width="2" height="3" fill="#2563eb"/>
    <rect x="1" y="3" width="1" height="2" fill="#1e40af"/>
    <!-- Right claw arm -->
    <rect x="19" y="8" width="4" height="2" fill="#3b82f6"/>
    <rect x="21" y="6" width="3" height="3" rx="1" fill="#60a5fa"/>
    <!-- Right pincer (open claw) -->
    <rect x="22" y="4" width="2" height="3" fill="#2563eb"/>
    <rect x="22" y="3" width="1" height="2" fill="#1e40af"/>
    <!-- Cephalothorax (fused head+chest) -->
    <rect x="6" y="7" width="12" height="5" rx="1" fill="#60a5fa"/>
    <!-- Eyes -->
    <rect x="8" y="8" width="2" height="2" fill="#fbbf24"/>
    <rect x="14" y="8" width="2" height="2" fill="#fbbf24"/>
    <rect x="8" y="8" width="1" height="1" fill="#000"/>
    <rect x="14" y="8" width="1" height="1" fill="#000"/>
    <!-- Mouth -->
    <rect x="11" y="10" width="2" height="1" fill="#0a0a0f"/>
    <!-- Abdomen segments (the REAL tail getting smaller toward back) -->
    <rect x="7" y="11" width="10" height="3" rx="1" fill="#3b82f6"/>
    <rect x="8" y="13" width="8" height="3" rx="1" fill="#60a5fa"/>
    <rect x="9" y="15" width="6" height="2" rx="1" fill="#3b82f6"/>
    <rect x="10" y="17" width="4" height="2" rx="1" fill="#60a5fa"/>
    <!-- Tail curves UP at the end -->
    <rect x="11" y="19" width="2" height="2" fill="#3b82f6"/>
    <!-- STINGER on the real tail tip -->
    <rect x="11" y="21" width="2" height="2" fill="#ef4444"/>
    <rect x="11" y="23" width="1" height="1" fill="#ef4444"/>
    <!-- Legs — exact lobster style, 1px longer (height=2) -->
    <rect x="5" y="11" width="2" height="2" fill="#1e40af"/>
    <rect x="17" y="11" width="2" height="2" fill="#1e40af"/>
    <rect x="5" y="13" width="2" height="2" fill="#1e40af"/>
    <rect x="17" y="13" width="2" height="2" fill="#1e40af"/>
    <rect x="6" y="15" width="2" height="2" fill="#1e40af"/>
    <rect x="16" y="15" width="2" height="2" fill="#1e40af"/>
  </svg>