    <rect x="8" y="12" width="10" height="5" fill="#3b82f6"/>
    <!-- Spots -->
    <rect x="10" y="11" width="1" height="1" fill="#0a0a0f"/>
    <rect x="14" y="13" width="1" height="1" fill="#0a0a0f"/>
    <rect x="12" y="15" width="1" height="1" fill="#0a0a0f"/>
    <!-- Tail -->
    <rect x="2" y="12" width="5" height="4" fill="#60a5fa"/>
