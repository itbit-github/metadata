<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <!-- Left claw arm attached to body -->
    <rect x="4" y="7" width="4" height="2" fill="#3b82f6"/>
    <!-- Left big claw (pinchy) — all blue -->
    <rect x="1" y="4" width="4" height="5" rx="1" fill="#60a5fa"/>
    <rect x="0" y="5" width="2" height="3" rx="1" fill="#3b82f6"/>
    <rect x="2" y="5" width="2" height="3" fill="#93c5fd"/>
    <rect x="0" y="8" width="2" height="2" fill="#3b82f6"/>
    <!-- Right claw arm attached to body -->
    <rect x="16" y="7" width="4" height="2" fill="#3b82f6"/>
    <!-- Right big claw (pinchy) — all blue -->
    <rect x="19" y="4" width="4" height="5" rx="1" fill="#60a5fa"/>
    <rect x="22" y="5" width="2" height="3" rx="1" fill="#3b82f6"/>
    <rect x="20" y="5" width="2" height="3" fill="#93c5fd"/>
    <rect x="22" y="8" width="2" height="2" fill="#3b82f6"/>
    <!-- Head -->
    <rect x="7" y="5" width="10" height="6" rx="2" fill="#60a5fa"/>
    <!-- Left eye on stalk -->
    <rect x="8" y="2" width="2" height="4" fill="#3b82f6"/>
    <rect x="8" y="1" width="2" height="2" fill="#fbbf24"/>
    <rect x="8" y="1" width="1" height="1" fill="#000"/>
    <!-- Right eye on stalk (fixed) -->
    <rect x="14" y="2" width="2" height="4" fill="#3b82f6"/>
    <rect x="14" y="1" width="2" height="2" fill="#fbbf24"/>
    <rect x="15" y="1" width="1" height="1" fill="#000"/>
    <!-- Antennae -->
    <rect x="9" y="0" width="1" height="2" fill="#3b82f6"/>
    <rect x="14" y="0" width="1" height="2" fill="#3b82f6"/>
    <!-- Body segments -->
    <rect x="8" y="10" width="8" height="3" fill="#60a5fa"/>
    <rect x="9" y="13" width="6" height="3" fill="#3b82f6"/>
    <rect x="10" y="16" width="4" height="3" fill="#60a5fa"/>
    <!-- Tail fan — all blue -->
    <rect x="9" y="19" width="2" height="3" fill="#3b82f6"/>
    <rect x="11" y="19" width="2" height="3" fill="#2563eb"/>
    <rect x="13" y="19" width="2" height="3" fill="#3b82f6"/>
    <!-- Legs -->
    <rect x="6" y="11" width="2" height="1" fill="#3b82f6"/>
    <rect x="16" y="11" width="2" height="1" fill="#3b82f6"/>
    <rect x="6" y="13" width="2" height="1" fill="#3b82f6"/>
    <rect x="16" y="13" width="2" height="1" fill="#3b82f6"/>
    <rect x="7" y="15" width="2" height="1" fill="#3b82f6"/>
    <rect x="15" y="15" width="2" height="1" fill="#3b82f6"/>
    <!-- Mouth -->
    <rect x="11" y="8" width="2" height="1" fill="#0a0a0f"/>
  </svg>