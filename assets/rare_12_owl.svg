<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <!-- Ears/tufts -->
    <rect x="6" y="1" width="2" height="4" fill="#3b82f6"/>
    <rect x="16" y="1" width="2" height="4" fill="#3b82f6"/>
    <!-- Head -->
    <rect x="3" y="4" width="18" height="11" rx="2" fill="#60a5fa"/>
    <!-- Eye frames -->
    <rect x="4" y="6" width="7" height="7" fill="#e5e7eb"/>
    <rect x="13" y="6" width="7" height="7" fill="#e5e7eb"/>
    <!-- Eyes -->
    <rect x="6" y="8" width="4" height="4" fill="#fbbf24"/>
    <rect x="14" y="8" width="4" height="4" fill="#fbbf24"/>
    <rect x="7" y="9" width="2" height="2" fill="#000"/>
    <rect x="15" y="9" width="2" height="2" fill="#000"/>
    <!-- Beak -->
    <rect x="11" y="11" width="2" height="3" fill="#f59e0b"/>
    <!-- Body -->
    <rect x="4" y="13" width="16" height="9" rx="1" fill="#60a5fa"/>
    <!-- Belly -->
    <rect x="7" y="14" width="10" height="6" rx="1" fill="#93c5fd"/>
    <!-- Chest pattern -->
    <rect x="8" y="15" width="2" height="1" fill="#3b82f6"/>
    <rect x="12" y="15" width="2" height="1" fill="#3b82f6"/>
    <rect x="9" y="17" width="2" height="1" fill="#3b82f6"/>
    <rect x="13" y="17" width="2" height="1" fill="#3b82f6"/>
    <!-- Wings -->
    <rect x="1" y="13" width="4" height="8" rx="1" fill="#3b82f6"/>
    <rect x="19" y="13" width="4" height="8" rx="1" fill="#3b82f6"/>
    <!-- Wing feathers -->
    <rect x="2" y="15" width="2" height="1" fill="#2563eb"/>
    <rect x="20" y="15" width="2" height="1" fill="#2563eb"/>
    <rect x="2" y="17" width="2" height="1" fill="#2563eb"/>
    <rect x="20" y="17" width="2" height="1" fill="#2563eb"/>
    <!-- Feet -->
    <rect x="8" y="21" width="3" height="2" fill="#f59e0b"/>
    <rect x="13" y="21" width="3" height="2" fill="#f59e0b"/>
  </svg>