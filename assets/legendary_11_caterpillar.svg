<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <!-- === LEGENDARY GOLD CATERPILLAR 🐛 === -->
    <!-- Body segments (curved upward) -->
    <!-- Segment 1 (tail) -->
    <rect x="16" y="15" width="5" height="5" rx="1" fill="#f59e0b"/>
    <rect x="17" y="17" width="3" height="3" rx="1" fill="#fbbf24"/>
    <!-- Segment 2 -->
    <rect x="12" y="12" width="5" height="5" rx="1" fill="#b45309"/>
    <rect x="13" y="13" width="3" height="3" rx="1" fill="#f59e0b"/>
    <!-- Segment 3 -->
    <rect x="8" y="8" width="5" height="5" rx="1" fill="#f59e0b"/>
    <rect x="9" y="9" width="3" height="3" rx="1" fill="#fbbf24"/>
    <!-- Segment 4 -->
    <rect x="4" y="6" width="5" height="5" rx="1" fill="#b45309"/>
    <rect x="5" y="7" width="3" height="3" rx="1" fill="#f59e0b"/>
    <!-- Head (big, front) -->
    <rect x="1" y="3" width="5" height="5" rx="1" fill="#f59e0b"/>
    <rect x="2" y="4" width="3" height="3" rx="1" fill="#fbbf24"/>
    <!-- Eye (cute) -->
    <rect x="2" y="4" width="1" height="1" fill="#000"/>
    <rect x="2" y="4" width="1" height="1" fill="#3b82f6"/>
    <!-- Mouth (smile) -->
    <rect x="2" y="6" width="2" height="1" fill="#1a1a1a"/>
    <rect x="3" y="6" width="1" height="1" fill="#f472b6"/>
    <!-- Antennae -->
    <rect x="2" y="1" width="1" height="2" fill="#b45309"/>
    <rect x="4" y="1" width="1" height="2" fill="#b45309"/>
    <rect x="1" y="0" width="1" height="1" fill="#fbbf24"/>
    <rect x="5" y="0" width="1" height="1" fill="#fbbf24"/>
    <!-- Tiny legs -->
    <rect x="5" y="11" width="1" height="1" fill="#b45309"/>
    <rect x="9" y="13" width="1" height="1" fill="#b45309"/>
    <rect x="13" y="17" width="1" height="1" fill="#b45309"/>
    <rect x="17" y="20" width="1" height="1" fill="#b45309"/>
    <!-- Gold legendary accents (spots) -->
    <rect x="5" y="7" width="1" height="1" fill="#fef3c7"/>
    <rect x="10" y="9" width="1" height="1" fill="#fef3c7"/>
    <rect x="14" y="13" width="1" height="1" fill="#fef3c7"/>
    <rect x="18" y="17" width="1" height="1" fill="#fef3c7"/>
  </svg>