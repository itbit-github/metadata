<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <!-- Tall pointy ears -->
    <rect x="5" y="0" width="2" height="4" fill="#3b82f6"/>
    <rect x="9" y="0" width="2" height="4" fill="#3b82f6"/>
    <rect x="6" y="0" width="1" height="2" fill="#2563eb"/>
    <rect x="9" y="0" width="1" height="2" fill="#2563eb"/>
    <!-- Wedge-shaped head -->
    <rect x="4" y="4" width="8" height="5" rx="1" fill="#60a5fa"/>
    <!-- Long pointed snout -->
    <rect x="1" y="6" width="4" height="2" fill="#93c5fd"/>
    <!-- Black nose tip -->
    <rect x="0" y="6" width="2" height="2" rx="1" fill="#1e3a8a"/>
    <!-- Eye -->
    <rect x="7" y="5" width="2" height="2" fill="#fbbf24"/>
    <rect x="7" y="5" width="1" height="1" fill="#000"/>
    <!-- Sleek body -->
    <rect x="8" y="9" width="12" height="5" rx="2" fill="#3b82f6"/>
    <!-- White chest -->
    <rect x="9" y="11" width="5" height="2" fill="#93c5fd"/>
    <!-- Front leg -->
    <rect x="10" y="14" width="2" height="5" fill="#1e40af"/>
    <rect x="9" y="19" width="3" height="1" fill="#1e3a8a"/>
    <!-- Back leg -->
    <rect x="16" y="14" width="2" height="5" fill="#1e40af"/>
    <rect x="15" y="19" width="3" height="1" fill="#1e3a8a"/>
    <!-- Bushy tail curling up -->
    <rect x="18" y="8" width="4" height="3" rx="1" fill="#3b82f6"/>
    <rect x="20" y="6" width="3" height="3" rx="1" fill="#2563eb"/>
    <rect x="21" y="4" width="2" height="3" fill="#3b82f6"/>
    <!-- Tail white tip -->
    <rect x="22" y="3" width="2" height="2" rx="1" fill="#93c5fd"/>
  </svg>