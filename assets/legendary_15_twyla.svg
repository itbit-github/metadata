<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <!-- === ORNATE GOLDEN STAND === -->
    <!-- Bottom base (wide, tiered) -->
    <rect x="4" y="20" width="16" height="2" fill="#f59e0b"/>
    <rect x="3" y="21" width="18" height="1" fill="#b45309"/>
    <!-- Middle tier -->
    <rect x="5" y="19" width="14" height="1" fill="#fbbf24"/>
    <!-- Top platform (where ball sits, bowl-shaped) -->
    <rect x="7" y="17" width="10" height="2" fill="#f59e0b"/>
    <rect x="6" y="18" width="12" height="1" fill="#b45309"/>
    <!-- Decorative rings on stand -->
    <rect x="8" y="16" width="8" height="1" fill="#fbbf24"/>
    <rect x="9" y="15" width="6" height="1" fill="#fef3c7"/>
    <rect x="10" y="14" width="4" height="1" fill="#fbbf24"/>
    <!-- === CRYSTAL BALL (PERFECTLY ROUND) === -->
    <circle cx="12" cy="9" r="8" fill="#a855f7"/>
    <circle cx="12" cy="9" r="7" fill="#c084fc"/>
    <circle cx="12" cy="9" r="6" fill="#ddd6fe"/>
    <circle cx="12" cy="9" r="4" fill="#fff" opacity="0.5"/>
    <!-- === MYSTICAL SWIRL (inside ball) === -->
    <rect x="10" y="5" width="4" height="1" fill="#7c3aed"/>
    <rect x="8" y="6" width="3" height="2" fill="#7c3aed"/>
    <rect x="13" y="7" width="3" height="2" fill="#7c3aed"/>
    <rect x="9" y="8" width="2" height="2" fill="#7c3aed"/>
    <rect x="12" y="9" width="3" height="2" fill="#7c3aed"/>
    <rect x="10" y="10" width="4" height="1" fill="#7c3aed"/>
    <!-- Clean, no floating pixels -->
    <!-- === REFLECTION === -->
    <rect x="6" y="4" width="3" height="2" fill="#fff" opacity="0.4"/>
    <rect x="7" y="5" width="2" height="2" fill="#fff" opacity="0.3"/>
  </svg>