<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
    <!-- Big eyes on stalks -->
    <rect x="5" y="2" width="5" height="5" fill="#60a5fa"/>
    <rect x="14" y="2" width="5" height="5" fill="#60a5fa"/>
    <rect x="6" y="3" width="3" height="3" fill="#0a0a0f"/>
    <rect x="15" y="3" width="3" height="3" fill="#0a0a0f"/>
    <rect x="7" y="4" width="1" height="1" fill="#fff"/>
    <rect x="16" y="4" width="1" height="1" fill="#fff"/>
    <!-- Eye shine -->
    <rect x="7" y="3" width="1" height="1" fill="#fbbf24"/>
    <rect x="16" y="3" width="1" height="1" fill="#fbbf24"/>
    <!-- Head -->
    <rect x="6" y="6" width="12" height="5" rx="1" fill="#60a5fa"/>
    <!-- Mouth -->
    <rect x="10" y="9" width="4" height="1" fill="#0a0a0f"/>
    <!-- Big body -->
    <rect x="4" y="10" width="16" height="10" rx="2" fill="#60a5fa"/>
    <!-- Belly -->
    <rect x="7" y="12" width="10" height="6" rx="1" fill="#93c5fd"/>
    <!-- Spots -->
    <rect x="5" y="11" width="1" height="1" fill="#3b82f6"/>
    <rect x="16" y="12" width="1" height="1" fill="#3b82f6"/>
    <rect x="6" y="15" width="2" height="1" fill="#3b82f6"/>
    <rect x="15" y="14" width="2" height="1" fill="#3b82f6"/>
    <!-- Front legs -->
    <rect x="4" y="14" width="3" height="4" fill="#60a5fa"/>
    <rect x="17" y="14" width="3" height="4" fill="#60a5fa"/>
    <rect x="3" y="17" width="3" height="3" fill="#60a5fa"/>
    <rect x="18" y="17" width="3" height="3" fill="#60a5fa"/>
    <!-- Back legs -->
    <rect x="6" y="18" width="4" height="4" rx="1" fill="#3b82f6"/>
    <rect x="14" y="18" width="4" height="4" rx="1" fill="#3b82f6"/>
    <!-- Toes -->
    <rect x="6" y="21" width="1" height="2" fill="#60a5fa"/>
    <rect x="9" y="21" width="1" height="2" fill="#60a5fa"/>
    <rect x="14" y="21" width="1" height="2" fill="#60a5fa"/>
    <rect x="17" y="21" width="1" height="2" fill="#60a5fa"/>
  </svg>